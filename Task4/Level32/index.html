<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Debug Lab – Code Fixer</title>
<style>
:root {
  --sky-top: #e0f2fe;
  --sky-bot: #bae6fd;
  --primary: #3b82f6;
  --accent: #0284c7;
  --yellow: #fef08a;
  --yellow-dark: #ca8a04;
  --green: #bbf7d0;
  --green-dark: #16a34a;
  --blue-panel: #f0fdf4;
  --ink: #1e293b;
  --card: rgba(255, 255, 255, 0.92);
  --shadow: 0 14px 40px rgba(2, 132, 199, 0.15);
  --radius: 28px;
  --font: 'Quicksand', 'Comic Sans MS', system-ui, -apple-system, sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;}
body{
  font-family:var(--font);
  color:var(--ink);
  overflow-x:hidden;
  background: linear-gradient(180deg, var(--sky-top), var(--sky-bot));
  min-height:100vh;
  position:relative;
}

/* Background scene with floating syntax elements */
.scene{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none}

.floating-syntax {
  position: absolute;
  font-family: 'Courier New', Courier, monospace;
  font-weight: 900;
  font-size: 1.6rem;
  color: rgba(14, 116, 144, 0.22);
  animation: floatUp 14s linear infinite;
  white-space: nowrap;
}
@keyframes floatUp {
  0% { transform: translateY(105vh) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(-15vh) rotate(360deg); opacity: 0; }
}

/* Header */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 22px;position:relative;z-index:5;max-width:1200px;margin:0 auto;
}
.iconbtn{
  padding:10px 24px;border-radius:999px;border:none;cursor:pointer;
  background:#0284c7;color:#fff;box-shadow:var(--shadow);
  font-family:var(--font);font-weight:800;font-size:1rem;
  display:flex;align-items:center;gap:8px;transition:transform .2s, box-shadow .2s;
}
.iconbtn.listen { background: var(--yellow-dark); color: #fff; }
.iconbtn:hover{transform:translateY(-2px);box-shadow:0 12px 24px rgba(0,0,0,0.15)}
.iconbtn:active{transform:scale(.95)}

.brand-title {
  text-align: center;
}
.brand-title h1 {
  font-size: clamp(2.2rem, 5vw, 3.5rem);
  font-weight: 900;
  color: #0369a1;
  text-shadow: 0 4px 0 #fff, 0 6px 0 rgba(0,0,0,0.05);
  letter-spacing: -1px;
}
.brand-title p {
  color: #0c4a6e; font-weight: 700; font-size: 1.1rem; margin-top: 4px;
}

/* Dots Indicator */
.dots-container {
  display: flex; justify-content: center; gap: 8px; margin: 8px 0;
}
.dot {
  width: 14px; height: 14px; border-radius: 50%; background: #bae6fd;
  border: 2px solid #fff; transition: background 0.3s;
}
.dot.active { background: var(--yellow-dark); }

/* Main Lab Container */
.stage{padding:10px 20px 50px;max-width:1000px;margin:0 auto;position:relative;z-index:2}
.main-card {
  background: var(--card); border: 8px solid #fff; border-radius: 36px;
  box-shadow: 0 20px 50px rgba(2, 132, 199, 0.1); padding: 30px; position: relative;
}

/* Bug Header Info Row */
.bug-info-row {
  display: flex; align-items: center; gap: 20px; margin-bottom: 20px; margin-top: 10px;
}
.bug-art-wrap {
  width: 90px; height: 90px; flex-shrink: 0;
}

.bug-details h2 {
  font-size: 1.7rem; color: #0f172a; font-weight: 800;
}
.bug-details p {
  font-size: 1.15rem; color: #334155; font-weight: 600; margin-top: 4px;
}

/* Code Panel Window - Modern Light IDE look */
.code-window {
  background: #f8fafc; border: 3px solid #e2e8f0; border-radius: 24px; padding: 24px;
  position: relative; overflow: hidden; margin-bottom: 25px;
}
.code-window::before {
  content: "BUGGY PYTHON CODE:"; position: absolute; top: 12px; left: 20px;
  background: #0284c7; color: #fff; font-size: 0.75rem; font-weight: 800;
  padding: 4px 12px; border-radius: 8px; letter-spacing: 0.5px;
}
.code-display {
  margin-top: 24px; font-family: 'Courier New', Courier, monospace;
  font-size: 1.25rem; font-weight: 700; line-height: 1.7; color: #0f172a;
  white-space: pre-wrap;
}
.code-line {
  display: block;
}
.code-display .keyword { color: #2563eb; }
.code-display .string { color: #0d9488; }
.code-display .comment { color: #64748b; font-style: italic; }

/* Choice Picker Sections */
.section-divider {
  text-align: center; font-weight: 800; color: #0369a1; font-size: 1.1rem;
  letter-spacing: 1px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 10px;
}
.choices-layout {
  display: flex; flex-direction: column; gap: 14px;
}
.choice-row {
  width: 100%; border: none; cursor: pointer; border-radius: 20px;
  padding: 18px 24px; font-family: var(--font); font-weight: 800; font-size: 1.15rem;
  color: #fff; text-align: left; display: flex; align-items: center; gap: 16px;
  box-shadow: 0 6px 0 rgba(0,0,0,0.1), inset 0 -4px 0 rgba(0,0,0,0.05);
  transition: transform 0.1s, filter 0.2s; position: relative; overflow: hidden;
}
.choice-row:nth-child(1) { background: linear-gradient(135deg, #38bdf8, #0284c7); }
.choice-row:nth-child(2) { background: linear-gradient(135deg, #60a5fa, #2563eb); }
.choice-row:nth-child(3) { background: linear-gradient(135deg, #4ade80, #16a34a); }

.choice-row:hover { filter: brightness(1.05); }
.choice-row:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.1); }

.choice-num {
  width: 36px; height: 36px; border-radius: 50%; background: rgba(0,0,0,0.1);
  display: grid; place-items: center; font-size: 1.2rem; color: #fff; flex-shrink: 0;
}

/* State Response Mechanics */
.choice-row.correct-pick {
  animation: celebrate 0.5s ease infinite alternate;
  box-shadow: 0 0 0 6px #fff, 0 0 25px var(--green-dark);
}
.choice-row.wrong-pick {
  animation: shake 0.4s ease;
  filter: grayscale(0.5) brightness(0.7);
  opacity: 0.7;
}
@keyframes shake {
  0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)}
}
@keyframes celebrate {
  from{transform:scale(1)} to{transform:scale(1.02)}
}

/* Floating Effects */
.float-move { animation: floatingArt 3s ease-in-out infinite; }
.float-move.alt-delay { animation-delay: -1.5s; }
@keyframes floatingArt {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* Modal Popup window */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px);
  display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px;
}
.modal-overlay.active { display: flex; }
.win-modal {
  background: #fff; border-radius: 36px; padding: 40px 30px; text-align: center;
  max-width: 480px; width: 100%; box-shadow: 0 30px 70px rgba(0,0,0,0.15);
  position: relative; animation: popUp 0.4s cubic-bezier(.17,1.2,.4,1.1);
}
@keyframes popUp { from{transform:scale(0.8);opacity:0} to{transform:scale(1);opacity:1} }

.modal-trophy-art { width: 140px; height: 140px; margin: 0 auto 15px; filter: drop-shadow(0 10px 15px rgba(255,182,0,0.25)); }
.win-modal h2 { font-size: 2.3rem; color: #2563eb; font-weight: 900; }
.win-modal p { color: #475569; font-weight: 700; margin-top: 8px; font-size: 1.1rem; }

.score-badge {
  background: #f0fdf4; border-radius: 20px; padding: 15px; margin: 20px 0;
  font-size: 1.3rem; font-weight: 800; color: #16a34a;
}

.restart-btn {
  background: linear-gradient(135deg, #fef08a, #eab308);
  border: none; padding: 14px 40px; font-family: var(--font); font-weight: 900;
  font-size: 1.2rem; color: #1e293b; border-radius: 999px; cursor: pointer;
  box-shadow: 0 8px 20px rgba(234, 179, 8, 0.3); transition: transform 0.2s;
}
.restart-btn:hover { transform: scale(1.05); }

/* Confetti System */
.confetti-box { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
.conf-bit { position: absolute; top: -10px; width: 12px; height: 12px; animation: fall 3s linear forwards; }
@keyframes fall { to { transform: translateY(450px) rotate(360deg); opacity: 0; } }

/* Vector SVGs via definitions */
svg.hidden-symbols { position: absolute; width: 0; height: 0; }

@media (max-width: 680px) {
  .bug-info-row { flex-direction: column; text-align: center; }
}
</style>
</head>

  </svg>

  <header class="topbar">
    <button class="iconbtn back" onclick="alert('Going back to Main Menu...')" aria-label="Back">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back
    </button>
    <div class="brand-title">
      <h1>Debug Lab</h1>
      <p>Find the bug – pick the correct fix</p>
    </div>
    <button class="iconbtn listen" id="audioReadout" aria-label="Listen">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
      Listen
    </button>
  </header>

  <div class="dots-container" id="indicatorsBox"></div>

  <main class="stage">
    <div class="main-card">
      <div class="bug-info-row">
        <div class="bug-art-wrap float-move" id="dynamicGraphic"></div>
        <div class="bug-details">
          <h2 id="bugTitle">Bug Title Loading...</h2>
          <p id="bugDescription">Bug Description Loading...</p>
        </div>
      </div>

      <div class="code-window">
        <div class="code-display" id="codeContainer"></div>
      </div>

      <div class="section-divider">
        <span> WHAT IS THE FIX? </span>
      </div>

      <div class="choices-layout" id="answersGrid"></div>

    </div>
  </main>

  <div class="modal-overlay" id="outcomeScreen">
    <div class="win-modal">
      <div class="confetti-box" id="confettiAnchor"></div>
      <div class="modal-trophy-art float-move">
         <svg viewBox="0 0 100 100"><use href="#model-trophy"/></svg>
      </div>
      <h2>Awesome Job!</h2>
      <p>You caught all the system errors and saved the code base!</p>
      <div class="score-badge">
        Score: <span id="finalScoreVal">0</span> / 3 Correct
      </div>
      <button class="restart-btn" id="reloadSession">Play Again</button>
    </div>
  </div>

  <script>
  (function(){
    'use strict';

    // Quiz dataset configuration
    const DATASET = [
      {
        title: "Pizza Order Bug",
        desc: "The chef wants 3 large pizzas. The code orders the wrong amount!",
        graphic: "#art-pizza",
        code: [
          `<span class="keyword">quantity</span> = 30`,
          `<span class="keyword">type</span> = <span class="string">"medium"</span>`,
          `<span class="keyword">print</span>(<span class="string">"Order:"</span>, quantity, type, <span class="string">"pizzas"</span>)`
        ],
        speech: "Pizza Order Bug. The chef wants 3 large pizzas. The code orders the wrong amount!",
        options: [
          { text: "Change quantity to 3 only", correct: false },
          { text: 'Keep 30 but change type to "large"', correct: false },
          { text: 'Change quantity to 3 and type to "large"', correct: true }
        ]
      },
      {
        title: "Traffic Light Bug",
        desc: "The traffic light says GO on red! Fix the logic.",
        graphic: "#art-traffic",
        code: [
          `<span class="keyword">if</span> light == <span class="string">"red"</span>:`,
          `    <span class="keyword">print</span>(<span class="string">"GO!"</span>)`,
          `<span class="keyword">elif</span> light == <span class="string">"green"</span>:`,
          `    <span class="keyword">print</span>(<span class="string">"STOP!"</span>)`
        ],
        speech: "Traffic Light Bug. The traffic light says GO on red! Fix the logic.",
        options: [
          { text: "Swap GO! and STOP! so red = STOP, green = GO", correct: true },
          { text: "Add a third condition for amber", correct: false },
          { text: "Remove the elif statement completely", correct: false }
        ]
      },
      {
        title: "Calculator Bug",
        desc: "The calculator adds instead of multiplying!",
        graphic: "#art-calculator",
        code: [
          `<span class="keyword">def</span> <span class="string">multiply</span>(a, b):`,
          `    <span class="keyword">return</span> a + b`,
          ``,
          `result = multiply(5, 4)  <span class="comment"># should be 20</span>`
        ],
        speech: "Calculator Bug. The calculator adds instead of multiplying!",
        options: [
          { text: "Change - to * in the return statement", correct: false },
          { text: "Change the function execution name", correct: false },
          { text: "Change + to * in the return statement", correct: true }
        ]
      }
    ];

    let currentIndex = 0;
    let successfulPicks = 0;
    let optionsLocked = false;

    const bugTitle = document.getElementById('bugTitle');
    const bugDescription = document.getElementById('bugDescription');
    const dynamicGraphic = document.getElementById('dynamicGraphic');
    const codeContainer = document.getElementById('codeContainer');
    const answersGrid = document.getElementById('answersGrid');
    const indicatorsBox = document.getElementById('indicatorsBox');
    const outcomeScreen = document.getElementById('outcomeScreen');
    const finalScoreVal = document.getElementById('finalScoreVal');
    const reloadSession = document.getElementById('reloadSession');
    const audioReadout = document.getElementById('audioReadout');
    const confettiAnchor = document.getElementById('confettiAnchor');
    const dynamicScene = document.getElementById('dynamicScene');

    // ONLY the specific requested keywords allowed to float in background
    const syntaxKeywords = [
      'for', 'if', 'elif', 'else', 'while', 'continue', 'def', 'return'
    ];

    // Inject floating syntax keywords at short intervals for a staggered effect
    const keywordPool = syntaxKeywords.flatMap(word => [word, word]);
    let keywordIndex = 0;
    const keywordTimer = setInterval(() => {
      if(keywordIndex >= keywordPool.length){
        clearInterval(keywordTimer);
        return;
      }

      const word = keywordPool[keywordIndex++];
      const span = document.createElement('span');
      span.className = 'floating-syntax';
      span.textContent = word;
      span.style.left = (Math.random() * 88 + 2) + '%';
      span.style.animationDelay = (Math.random() * -4) + 's';
      span.style.animationDuration = (12 + Math.random() * 6) + 's';
      dynamicScene.appendChild(span);
    }, 240);

    function setupProgressIndicators() {
      indicatorsBox.innerHTML = '';
      DATASET.forEach((_, idx) => {
        const dot = document.createElement('div');
        dot.className = 'dot' + (idx === currentIndex ? ' active' : '');
        indicatorsBox.appendChild(dot);
      });
    }

    audioReadout.addEventListener('click', () => {
      const activeStep = DATASET[currentIndex];
      if('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const speechUnit = new SpeechSynthesisUtterance(activeStep.speech);
        speechUnit.rate = 0.95;
        window.speechSynthesis.speak(speechUnit);
      } else {
        alert("Text-to-speech audio narration isn't fully supported on your browser device.");
      }
    });

    function renderStep() {
      optionsLocked = false;
      setupProgressIndicators();
      
      const stepData = DATASET[currentIndex];
      bugTitle.textContent = stepData.title;
      bugDescription.textContent = stepData.desc;
      
      dynamicGraphic.innerHTML = `<svg viewBox="0 0 100 100" style="width:100%; height:100%;"><use href="${stepData.graphic}"/></svg>`;
      
      codeContainer.innerHTML = '';
      stepData.code.forEach(lineText => {
        const lineSpan = document.createElement('span');
        lineSpan.className = 'code-line';
        lineSpan.innerHTML = lineText === '' ? '&nbsp;' : lineText;
        codeContainer.appendChild(lineSpan);
      });
      
      answersGrid.innerHTML = '';
      stepData.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'choice-row';
        btn.innerHTML = `<span class="choice-num">${i + 1}</span> <span>${opt.text}</span>`;
        btn.addEventListener('click', () => handleSelection(opt, btn));
        answersGrid.appendChild(btn);
      });
    }

    function handleSelection(option, element) {
      if(optionsLocked) return;

      if(option.correct) {
        optionsLocked = true;
        element.classList.add('correct-pick');
        successfulPicks++;
        setTimeout(transitionNext, 1200);
      } else {
        element.classList.add('wrong-pick');
        optionsLocked = false;
        setTimeout(() => {
          element.classList.remove('wrong-pick');
        }, 450);
      }
    }

    function transitionNext() {
      currentIndex++;
      if(currentIndex < DATASET.length) {
        renderStep();
      } else {
        launchCompletionModal();
      }
    }

    function launchCompletionModal() {
      finalScoreVal.textContent = successfulPicks;
      outcomeScreen.classList.add('active');
      triggerConfettiBurst();
    }

    function triggerConfettiBurst() {
      confettiAnchor.innerHTML = '';
      const hues = ['#3b82f6', '#0284c7', '#ca8a04', '#16a34a', '#ffffff'];
      for(let i=0; i<45; i++) {
        const particle = document.createElement('span');
        particle.className = 'conf-bit';
        particle.style.background = hues[i % hues.length];
        particle.style.left = (Math.random() * 100) + '%';
        particle.style.animationDuration = (1.5 + Math.random() * 2) + 's';
        particle.style.animationDelay = (Math.random() * 0.5) + 's';
        particle.style.width = particle.style.height = (6 + Math.random() * 8) + 'px';
        confettiAnchor.appendChild(particle);
      }
    }

    reloadSession.addEventListener('click', () => {
      currentIndex = 0;
      successfulPicks = 0;
      outcomeScreen.classList.remove('active');
      renderStep();
    });

    renderStep();

  })();
  </script>
</body>
</html>
