<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Octal System Lab</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');

  :root {
    --cream: #F8E9B5;
    --dark-blue: #1a2e6b;
    --mid-blue: #2d5be3;
    --light-blue: #d0e8ff;
    --sky: #7ec8f5;
    --green: #2ec87a;
    --light-green: #d4f5e2;
    --orange: #f5873a;
    --yellow: #ffd84d;
    --board-bg: #0d1b4b;
    --board-panel: #162060;
    --bit-blue: #3b82f6;
    --white: #ffffff;
    --shadow: rgba(0,0,0,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Clouds */
  .cloud {
    position: fixed;
    background: white;
    border-radius: 50px;
    opacity: 0.85;
    pointer-events: none;
    z-index: 0;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: white;
    border-radius: 50%;
  }
  .cloud-1 { width: 120px; height: 45px; top: 18px; left: 30px; }
  .cloud-1::before { width: 60px; height: 60px; top: -30px; left: 15px; }
  .cloud-1::after { width: 45px; height: 45px; top: -20px; left: 55px; }
  .cloud-2 { width: 100px; height: 38px; top: 25px; right: 60px; }
  .cloud-2::before { width: 50px; height: 50px; top: -25px; left: 12px; }
  .cloud-2::after { width: 38px; height: 38px; top: -18px; left: 45px; }
  .cloud-3 { width: 80px; height: 30px; top: 80px; right: 20px; }
  .cloud-3::before { width: 38px; height: 38px; top: -20px; left: 10px; }
  .cloud-3::after { width: 30px; height: 30px; top: -14px; left: 35px; }

  /* Flowers/Grass */
  .deco-bottom {
    position: fixed; bottom: 0; pointer-events: none; z-index: 0;
    font-size: 28px; line-height: 1;
  }
  .deco-bottom-left { left: 10px; }
  .deco-bottom-right { right: 10px; }

  /* NAV */
  nav {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 28px;
  }
  .btn-back {
    background: white; border: 2.5px solid var(--dark-blue);
    border-radius: 50px; padding: 8px 20px;
    font-family: 'Nunito', sans-serif; font-weight: 800;
    font-size: 15px; color: var(--dark-blue);
    cursor: pointer; transition: all .2s;
    box-shadow: 0 3px 8px var(--shadow);
  }
  .btn-back:hover { background: var(--light-blue); transform: scale(1.06); }

  .score-box {
    background: white; border: 2.5px solid var(--mid-blue);
    border-radius: 14px; padding: 8px 24px;
    font-weight: 800; font-size: 16px; color: var(--dark-blue);
    box-shadow: 0 3px 8px var(--shadow);
    letter-spacing: 1px;
  }

  .btn-listen {
    background: var(--yellow); border: none;
    border-radius: 50px; padding: 9px 22px;
    font-family: 'Nunito', sans-serif; font-weight: 800;
    font-size: 15px; color: var(--dark-blue);
    cursor: pointer; transition: all .2s;
    box-shadow: 0 4px 12px rgba(255,180,0,0.4);
    display: flex; align-items: center; gap: 6px;
  }
  .btn-listen:hover { box-shadow: 0 6px 20px rgba(255,180,0,0.7); transform: scale(1.05); }

  /* HEADING */
  .heading-section {
    text-align: center; padding: 10px 20px 4px;
    position: relative; z-index: 5;
  }
  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2.2rem, 6vw, 3.8rem);
    color: var(--dark-blue);
    text-shadow: 3px 3px 0 white, 5px 5px 0 rgba(0,0,0,0.08);
    letter-spacing: 1px;
  }
  .subtitle {
    color: var(--orange); font-weight: 700;
    font-size: clamp(0.95rem, 2.5vw, 1.15rem);
    margin-top: 4px;
  }

  /* MAIN CARD */
  .main-card {
    background: #f0f0f5; border-radius: 32px;
    margin: 16px auto; max-width: 920px; width: 94%;
    padding: 24px 22px 28px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    position: relative; z-index: 5;
  }

  .hw-label {
    font-weight: 800; font-size: 12px; letter-spacing: 3px;
    color: var(--mid-blue); text-transform: uppercase; margin-bottom: 12px;
  }

  .target-row {
    display: flex; align-items: center; gap: 12px; margin-bottom: 10px; flex-wrap: wrap;
  }
  .target-label { font-weight: 800; color: var(--dark-blue); font-size: 15px; }
  .target-display {
    background: var(--light-green); border: 2px solid var(--green);
    border-radius: 12px; padding: 6px 18px;
    display: flex; gap: 14px;
  }
  .target-digit {
    font-family: 'Fredoka One', cursive;
    font-size: 1.5rem; color: #1a7a45; min-width: 24px; text-align: center;
  }

  .tip-msg {
    color: var(--mid-blue); font-size: 13px; font-weight: 600; margin-bottom: 16px;
  }

  /* BOARD */
  .board {
    background: var(--board-bg); border-radius: 24px;
    padding: 20px 16px 22px;
    display: flex; justify-content: center; align-items: flex-start;
    gap: 14px; flex-wrap: wrap; position: relative;
    box-shadow: 0 8px 30px rgba(0,0,0,0.35);
  }

  /* STATIONS */
  .station {
    background: var(--board-panel); border-radius: 18px;
    padding: 14px 12px 12px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    flex: 1; min-width: 170px; max-width: 220px;
    border: 2px solid rgba(255,255,255,0.08);
    transition: border-color .3s;
  }
  .station.selected { border-color: var(--green); box-shadow: 0 0 16px rgba(46,200,122,0.45); }
  .station-label {
    color: var(--sky); font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  }

  .bits-row {
    display: flex; gap: 8px;
  }
  .bit-block {
    width: 46px; height: 46px;
    background: var(--bit-blue); border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fredoka One', cursive; font-size: 1.4rem; color: white;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.4), inset 0 -3px 0 rgba(0,0,0,0.25);
    transition: all .15s; user-select: none;
  }
  .bit-block:hover { transform: translateY(-2px) scale(1.1); background: #60a5fa; }
  .bit-block:active { transform: translateY(1px) scale(0.95); }
  .bit-block.on { background: #22c55e; box-shadow: 0 4px 10px rgba(34,197,94,0.5), inset 0 -3px 0 rgba(0,0,0,0.25); }

  .register {
    background: #050e2a; border-radius: 12px;
    width: 100%; padding: 10px 0;
    display: flex; align-items: center; justify-content: center;
    border: 2.5px solid rgba(255,255,255,0.1);
  }
  .register-val {
    font-family: 'Courier New', monospace;
    font-size: 2.4rem; color: white; font-weight: 900;
    letter-spacing: 2px; text-shadow: 0 0 14px rgba(255,255,255,0.5);
  }

  /* Characters */
  .char {
    font-size: 2rem; cursor: grab; position: relative;
    animation: float-char 3s ease-in-out infinite;
    user-select: none; z-index: 20;
  }
  .char:nth-child(2) { animation-delay: 1s; }
  .char:nth-child(3) { animation-delay: 2s; }
  @keyframes float-char {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-7px); }
  }
  .char.dragging { opacity: 0.7; cursor: grabbing; }

  /* Robot */
  .robot {
    position: absolute; left: -50px; top: 50%;
    transform: translateY(-50%);
    font-size: 2.5rem;
    animation: float-char 2.5s ease-in-out infinite;
    pointer-events: none;
  }

  /* OUTPUT */
  .output-panel {
    background: var(--board-bg); border-radius: 20px;
    padding: 16px 20px; margin: 0 0 14px;
    text-align: center;
  }
  .output-title {
    color: var(--sky); font-size: 11px; font-weight: 700;
    letter-spacing: 5px; text-transform: uppercase; margin-bottom: 10px;
  }
  .output-screen {
    background: #050e2a; border-radius: 14px;
    padding: 14px 0; border: 2px solid rgba(255,255,255,0.1);
    display: inline-block; min-width: 180px;
  }
  .output-val {
    font-family: 'Courier New', monospace;
    font-size: 2.8rem; color: white; font-weight: 900;
    letter-spacing: 8px; text-shadow: 0 0 20px rgba(255,255,255,0.6);
  }

  /* VALIDATE */
  .validate-bar {
    background: var(--light-blue); border-radius: 20px;
    padding: 14px 20px; text-align: center;
  }
  .btn-validate {
    background: white; border: 3px solid var(--mid-blue);
    border-radius: 50px; padding: 12px 36px;
    font-family: 'Nunito', sans-serif; font-weight: 800;
    font-size: 1.05rem; color: var(--dark-blue);
    cursor: pointer; transition: all .2s;
    box-shadow: 0 4px 14px rgba(45,91,227,0.2);
  }
  .btn-validate:hover { transform: scale(1.06); box-shadow: 0 6px 20px rgba(45,91,227,0.35); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    display: none; align-items: center; justify-content: center;
    z-index: 100; backdrop-filter: blur(4px);
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: white; border-radius: 28px;
    padding: 40px 48px; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    max-width: 380px; width: 90%;
    animation: pop-in .35s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes pop-in {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .modal-emoji { font-size: 3.5rem; margin-bottom: 10px; }
  .modal-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem; color: var(--dark-blue); margin-bottom: 8px;
  }
  .modal-msg { font-size: 1rem; color: #444; font-weight: 600; margin-bottom: 24px; }
  .btn-modal-close {
    background: var(--green); border: none;
    border-radius: 50px; padding: 12px 32px;
    font-family: 'Nunito', sans-serif; font-weight: 800;
    font-size: 1rem; color: white; cursor: pointer;
    box-shadow: 0 4px 14px rgba(46,200,122,0.4);
    transition: all .2s;
  }
  .btn-modal-close:hover { transform: scale(1.06); }

  /* Confetti */
  .confetti-piece {
    position: fixed; width: 10px; height: 10px;
    pointer-events: none; z-index: 200;
    border-radius: 3px;
    animation: confetti-fall 1.8s ease-in forwards;
  }
  @keyframes confetti-fall {
    0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* Floating chars (draggable) */
  .floating-chars {
    display: flex; justify-content: space-around;
    margin: 12px 0 0;
    gap: 12px;
  }

  @media (max-width: 600px) {
    .board { padding: 14px 8px; gap: 8px; }
    .station { min-width: 130px; }
    .bit-block { width: 38px; height: 38px; font-size: 1.1rem; }
    .register-val { font-size: 1.8rem; }
    .output-val { font-size: 2rem; }
  }
</style>
</head>
<body>

<!-- Clouds -->
<div class="cloud cloud-1"></div>
<div class="cloud cloud-2"></div>
<div class="cloud cloud-3"></div>

<!-- Bottom decor -->
<div class="deco-bottom deco-bottom-left">🌿🌸🌿</div>
<div class="deco-bottom deco-bottom-right">🌿🌼🌿</div>

<!-- NAV -->
<nav>
  <button class="btn-back" onclick="history.back()" aria-label="Go back">← Back</button>
  <div class="score-box" aria-live="polite">Score: <span id="score">0</span>/5</div>
  <button class="btn-listen" onclick="speakIntro()" aria-label="Listen to instructions">
    🔊 Listen
  </button>
</nav>

<!-- HEADING -->
<div class="heading-section">
  <h1>Octal System Lab</h1>
  <p class="subtitle">Group bits into triples to build octal numbers</p>
</div>

<!-- MAIN CARD -->
<div class="main-card" role="main">
  <div class="hw-label">Hardware Simulation</div>

  <div class="target-row">
    <span class="target-label">Target:</span>
    <div class="target-display" id="target-display">
      <span class="target-digit" id="td0">3</span>
      <span class="target-digit" id="td1">1</span>
      <span class="target-digit" id="td2">6</span>
    </div>
  </div>

  <p class="tip-msg">☝ Tip: drag the floating buddies anywhere you like!</p>

  <!-- BOARD -->
  <div class="board" id="board" role="group" aria-label="Binary input stations">
    <div class="robot" aria-hidden="true">🤖</div>

    <!-- Station 0 -->
    <div class="station selected" id="station-0" role="group" aria-label="Octal digit station 1">
      <div class="station-label">Station 1</div>
      <div class="bits-row" id="bits-0">
        <div class="bit-block" role="button" tabindex="0" aria-label="Bit 2 of station 1" data-station="0" data-bit="0">0</div>
        <div class="bit-block" role="button" tabindex="0" aria-label="Bit 1 of station 1" data-station="0" data-bit="1">0</div>
        <div class="bit-block" role="button" tabindex="0" aria-label="Bit 0 of station 1" data-station="0" data-bit="2">0</div>
      </div>
      <div class="register" aria-label="Octal value for station 1">
        <span class="register-val" id="reg-0">0</span>
      </div>
      <div class="char" draggable="true" aria-hidden="true">⭐</div>
    </div>

    <!-- Station 1 -->
    <div class="station" id="station-1" role="group" aria-label="Octal digit station 2">
      <div class="station-label">Station 2</div>
      <div class="bits-row" id="bits-1">
        <div class="bit-block" role="button" tabindex="0" aria-label="Bit 2 of station 2" data-station="1" data-bit="0">0</div>
        <div class="bit-block" role="button" tabindex="0" aria-label="Bit 1 of station 2" data-station="1" data-bit="1">0</div>
        <div class="bit-block" role="button" tabindex="0" aria-label="Bit 0 of station 2" data-station="1" data-bit="2">0</div>
      </div>
      <div class="register" aria-label="Octal value for station 2">
        <span class="register-val" id="reg-1">0</span>
      </div>
      <div class="char" draggable="true" aria-hidden="true" style="animation-delay:.8s">🪐</div>
    </div>

    <!-- Station 2 -->
    <div class="station" id="station-2" role="group" aria-label="Octal digit station 3">
      <div class="station-label">Station 3</div>
      <div class="bits-row" id="bits-2">
        <div class="bit-block" role="button" tabindex="0" aria-label="Bit 2 of station 3" data-station="2" data-bit="0">0</div>
        <div class="bit-block" role="button" tabindex="0" aria-label="Bit 1 of station 3" data-station="2" data-bit="1">0</div>
        <div class="bit-block" role="button" tabindex="0" aria-label="Bit 0 of station 3" data-station="2" data-bit="2">0</div>
      </div>
      <div class="register" aria-label="Octal value for station 3">
        <span class="register-val" id="reg-2">0</span>
      </div>
      <div class="char" draggable="true" aria-hidden="true" style="animation-delay:1.6s">☁️</div>
    </div>
  </div>

  <!-- OUTPUT -->
  <div class="output-panel" style="margin-top:16px">
    <div class="output-title">System Output</div>
    <div class="output-screen">
      <span class="output-val" id="output-val" aria-live="polite">000</span>
    </div>
  </div>

  <!-- VALIDATE -->
  <div class="validate-bar">
    <button class="btn-validate" onclick="validate()" aria-label="Validate your hardware setup">
      ✓ Validate Hardware
    </button>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal-box">
    <div class="modal-emoji" id="modal-emoji">🎉</div>
    <div class="modal-title" id="modal-title">Excellent!</div>
    <div class="modal-msg" id="modal-msg">You built the octal number 316!</div>
    <button class="btn-modal-close" onclick="closeModal()">Keep Playing</button>
  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  const targets = ['316', '472', '053', '621', '137'];
  let currentTarget = 0;
  let score = 0;
  const bits = [[0,0,0],[0,0,0],[0,0,0]];

  // ── Bit toggling ──────────────────────────────────────────────────────────
  document.querySelectorAll('.bit-block').forEach(el => {
    el.addEventListener('click', () => toggleBit(el));
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleBit(el); }
    });
  });

  function toggleBit(el) {
    const s = +el.dataset.station;
    const b = +el.dataset.bit;
    bits[s][b] = 1 - bits[s][b];
    el.textContent = bits[s][b];
    el.classList.toggle('on', bits[s][b] === 1);
    updateRegisters();
    // Select station visually
    document.querySelectorAll('.station').forEach(st => st.classList.remove('selected'));
    document.getElementById('station-' + s).classList.add('selected');
  }

  function updateRegisters() {
    let out = '';
    for (let s = 0; s < 3; s++) {
      const val = bits[s][0]*4 + bits[s][1]*2 + bits[s][2];
      document.getElementById('reg-' + s).textContent = val;
      out += val;
    }
    document.getElementById('output-val').textContent = out;
  }

  // ── Target ────────────────────────────────────────────────────────────────
  function loadTarget() {
    const t = targets[currentTarget % targets.length];
    ['td0','td1','td2'].forEach((id, i) => {
      document.getElementById(id).textContent = t[i];
    });
  }

  // ── Validate ──────────────────────────────────────────────────────────────
  function validate() {
    const out = document.getElementById('output-val').textContent;
    const t = targets[currentTarget % targets.length];
    if (out === t) {
      score = Math.min(5, score + 1);
      document.getElementById('score').textContent = score;
      showModal(true, t);
      launchConfetti();
      currentTarget++;
      setTimeout(() => loadTarget(), 2000);
    } else {
      showModal(false, t);
    }
  }

  // ── Modal ─────────────────────────────────────────────────────────────────
  function showModal(success, target) {
    const modal = document.getElementById('modal');
    document.getElementById('modal-emoji').textContent = success ? '🎉' : '🤔';
    document.getElementById('modal-title').textContent = success ? 'Excellent!' : 'Try Again!';
    document.getElementById('modal-msg').textContent = success
      ? `You built the octal number ${target}!`
      : 'Keep experimenting with the bit groups.';
    modal.classList.add('show');
    if (success) speak(`Excellent! You built the octal number ${target.split('').join(' ')}`);
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('show');
  }

  // Close modal on overlay click
  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // ── Confetti ───────────────────────────────────────────────────────────────
  function launchConfetti() {
    const colors = ['#f5873a','#2ec87a','#2d5be3','#ffd84d','#e83a6f','#7ec8f5'];
    for (let i = 0; i < 60; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random()*100 + 'vw';
      el.style.background = colors[Math.floor(Math.random()*colors.length)];
      el.style.animationDuration = (1.2 + Math.random()*1) + 's';
      el.style.animationDelay = Math.random()*0.5 + 's';
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px';
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }
  }

  // ── Speech ────────────────────────────────────────────────────────────────
  function speak(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.rate = 0.92; utt.pitch = 1.05;
    window.speechSynthesis.speak(utt);
  }

  function speakIntro() {
    speak('Welcome to the Octal System Lab. Group the binary bits into triples and create the target octal number.');
  }

  // ── Draggable chars ───────────────────────────────────────────────────────
  let dragTarget = null, ox = 0, oy = 0;

  document.querySelectorAll('.char').forEach(el => {
    el.addEventListener('mousedown', startDrag);
    el.addEventListener('touchstart', startDragTouch, { passive: true });
  });

  function startDrag(e) {
    dragTarget = e.currentTarget;
    dragTarget.classList.add('dragging');
    const r = dragTarget.getBoundingClientRect();
    ox = e.clientX - r.left; oy = e.clientY - r.top;
    dragTarget.style.position = 'fixed';
    dragTarget.style.left = (e.clientX - ox) + 'px';
    dragTarget.style.top = (e.clientY - oy) + 'px';
    e.preventDefault();
  }

  function startDragTouch(e) {
    const touch = e.touches[0];
    dragTarget = e.currentTarget;
    dragTarget.classList.add('dragging');
    const r = dragTarget.getBoundingClientRect();
    ox = touch.clientX - r.left; oy = touch.clientY - r.top;
    dragTarget.style.position = 'fixed';
    dragTarget.style.left = (touch.clientX - ox) + 'px';
    dragTarget.style.top = (touch.clientY - oy) + 'px';
  }

  document.addEventListener('mousemove', e => {
    if (!dragTarget) return;
    dragTarget.style.left = (e.clientX - ox) + 'px';
    dragTarget.style.top = (e.clientY - oy) + 'px';
  });

  document.addEventListener('touchmove', e => {
    if (!dragTarget) return;
    const t = e.touches[0];
    dragTarget.style.left = (t.clientX - ox) + 'px';
    dragTarget.style.top = (t.clientY - oy) + 'px';
  }, { passive: true });

  document.addEventListener('mouseup', () => { if (dragTarget) dragTarget.classList.remove('dragging'); dragTarget = null; });
  document.addEventListener('touchend', () => { if (dragTarget) dragTarget.classList.remove('dragging'); dragTarget = null; });

  // ── Init ───────────────────────────────────────────────────────────────────
  loadTarget();
</script>
</body>
</html>
